name: Deploy Beta to beta.palmdrive.vc

on:
  push:
    branches: ['claude/**']

permissions:
  contents: read

jobs:
  deploy-beta:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Set beta CNAME
        run: echo "beta.palmdrive.vc" > public/CNAME

      - name: Inject password gate
        run: |
          PASSWORD_SCRIPT='<script>(function(){var k="beta_auth";if(sessionStorage.getItem(k)==="1")return;var p=prompt("Enter password to view this site:");if(p==="pd14"){sessionStorage.setItem(k,"1")}else{document.documentElement.innerHTML="<body style=\"background:#1E2022;color:#fff;display:flex;align-items:center;justify-content:center;height:100vh;font-family:sans-serif\"><h1>Access denied</h1></body>";throw new Error("denied")}})()</script>'
          find public -name "*.html" -exec sed -i "s|<head>|<head>${PASSWORD_SCRIPT}|" {} +

      - name: Deploy to beta repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.BETA_DEPLOY_KEY }}
          external_repository: hendrickPD/website-beta
          publish_dir: ./public
          publish_branch: main
